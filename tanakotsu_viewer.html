<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" id="viewport-meta">
  <title>宝美堂_WS画像チェックツール_v1.26</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="theme-color" content="#35B79D">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="WS画像チェック">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style>
    :root { --footer-h: 30px; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: #f0f2f5;
      padding: 0 12px;
      padding-bottom: calc(100px + env(safe-area-inset-bottom));
      min-height: 100vh;
    }

    /* ── パスワード画面 ── */
    .auth-overlay {
      position: fixed; inset: 0; background: #f0f2f5; z-index: 200;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .auth-box {
      background: #fff; border-radius: 10px; padding: 36px 24px 28px;
      width: 100%; max-width: 320px; box-shadow: 0 4px 24px rgba(0,0,0,0.13); text-align: center;
    }
    .auth-logo { font-size: 44px; margin-bottom: 10px; }
    .auth-title { font-size: 16px; font-weight: 700; color: #222; margin-bottom: 4px; }
    .auth-sub { font-size: 12px; color: #aaa; margin-bottom: 28px; }
    .auth-input {
      width: 100%; padding: 13px 14px; border: 1.5px solid #ddd; border-radius: 6px;
      font-size: 18px; outline: none; margin-bottom: 12px; text-align: center; letter-spacing: 4px;
    }
    .auth-input::placeholder { letter-spacing: normal; }
    .auth-input:focus { border-color: #35B79D; }
    .btn-login {
      width: 100%; padding: 13px; background: #35B79D; color: #fff;
      border: none; border-radius: 6px; font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .btn-login:active { background: #2a9a84; }
    .auth-error { font-size: 13px; color: #e53935; margin-top: 12px; min-height: 18px; }

    /* ── アプリヘッダー ── */
    .app-header {
      display: flex; align-items: center; height: 48px; background: #f0f2f5;
    }
    h1.app-title {
      font-size: 15px; font-weight: 700; color: #1a1a1a;
      display: flex; align-items: center; gap: 7px;
    }
    .app-logo { width: 26px; height: 26px; object-fit: contain; flex-shrink: 0; }

    /* ── タブバー（タブのみ上部固定） ── */
    .tabbar {
      position: sticky; top: 0; z-index: 50; display: flex;
      background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      margin: 0 -12px 14px;
    }
    .tab {
      flex: 1; padding: 13px 0; border: none; background: transparent;
      font-size: 14px; font-weight: 600; color: rgb(26,35,50);
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
      -webkit-tap-highlight-color: transparent; transition: color 0.15s, background 0.15s;
    }
    .tab-icon { font-size: 17px; line-height: 1; }
    .tab.active { color: #fff; background: rgb(26,35,50); }

    /* ── タブペイン ── */
    .tabpane { display: none; }
    .tabpane.active { display: block; }

    /* ── 入力パネル（アコーディオン） ── */
    .panel {
      background: #fff; border-radius: 8px; margin-bottom: 14px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.10); overflow: hidden;
    }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; cursor: pointer; user-select: none; -webkit-user-select: none;
    }
    .panel-header:active { background: #f7f7f7; }
    .panel-title-row { display: flex; align-items: center; gap: 8px; }
    .panel-icon { font-size: 17px; }
    .panel-title { font-size: 15px; font-weight: 700; color: #222; }
    .panel-status { font-size: 12px; color: #35B79D; font-weight: 600; margin-left: 2px; }
    .toggle-icon {
      width: 24px; height: 24px; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: transform 0.25s;
    }
    .panel.collapsed .toggle-icon { transform: rotate(-180deg); }
    .panel-body {
      padding: 0 16px 16px; overflow: hidden; max-height: 700px; opacity: 1;
      transition: max-height 0.3s ease, opacity 0.25s ease, padding-bottom 0.3s ease;
    }
    .panel.collapsed .panel-body { max-height: 0; opacity: 0; padding-bottom: 0; }
    .panel-hint { font-size: 12px; color: #888; margin-bottom: 10px; line-height: 1.7; }

    textarea {
      width: 100%; height: 240px; border: 1.5px solid #e0e0e0; border-radius: 6px;
      padding: 10px 12px; font-size: 14px; font-family: monospace; resize: vertical;
      outline: none; line-height: 1.6; color: #333;
    }
    textarea:focus { border-color: #35B79D; }

    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    button { border: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .btn-clear {
      flex: 1; padding: 12px 0; border: 1.5px solid #ddd; border-radius: 6px;
      font-size: 14px; font-weight: 600; color: #666; background: #fff;
    }
    .btn-clear:active { background: #f5f5f5; }
    .btn-show {
      flex: 2; padding: 12px 0; border-radius: 6px; font-size: 14px; font-weight: 700;
      color: #fff; background: #35B79D; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-show:active { background: #2a9a84; }

    /* ── 検索結果ヘッダー ── */
    .results-header {
      display: none; align-items: center; justify-content: space-between; margin-bottom: 10px;
    }
    .results-count { font-size: 15px; font-weight: 700; color: #1a1a1a; }
    .btn-select-all {
      font-size: 13px; font-weight: 600; color: #35B79D; background: transparent; border: none; padding: 4px 0;
    }
    .btn-select-all:active { opacity: 0.6; }

    /* ── カードグリッド ── */
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }

    /* ── カード ── */
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.10); overflow: hidden; }

    .card-img-wrap {
      position: relative; width: 100%; padding-top: 100%; background: #f3f3f3;
      overflow: hidden; transition: opacity .2s; cursor: pointer;
    }
    .card.checked .card-img-wrap { opacity: 0.6; }
    .card-img-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }

    /* 確認済みオーバーレイ */
    .check-overlay {
      display: none; position: absolute; inset: 0; background: rgba(53,183,157,0.20);
      align-items: center; justify-content: center; z-index: 4;
    }
    .check-overlay-icon {
      width: 44px; height: 44px; background: #35B79D; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 10px rgba(53,183,157,0.5);
    }
    .card.checked .check-overlay { display: flex; }

    /* NO IMAGE */
    .noimage-wrap {
      position: absolute; inset: 0; display: none; flex-direction: column;
      align-items: center; justify-content: center; background: #eef2f7; gap: 6px;
    }
    .noimage-wrap span { font-size: 11px; color: #aaa; font-weight: 600; }

    .card-num {
      position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.52);
      color: #fff; font-size: 9px; font-family: monospace; padding: 2px 5px;
      border-radius: 3px; z-index: 3;
    }

    /* カード下部 */
    .card-footer {
      display: flex; align-items: center; padding: 8px 10px; gap: 6px; border-top: 1px solid #f0f0f0;
    }
    .card-code {
      flex: 1; font-size: 10px; font-family: monospace; color: #555;
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .card-status { font-size: 11px; font-weight: 600; color: #aaa; white-space: nowrap; }
    .card.checked .card-status { color: #35B79D; }
    .card-checkbox { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; accent-color: #35B79D; }

    /* ── 保存バー ── */
    .save-bar {
      display: none; position: fixed;
      bottom: calc(var(--footer-h) + env(safe-area-inset-bottom));
      left: 0; right: 0; padding: 8px 12px;
      background: rgba(240,242,245,0.96); backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px); z-index: 45;
    }
    .btn-save-fixed {
      display: block; width: 100%; padding: 14px; background: #E67E22;
      color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.3px;
    }
    .btn-save-fixed:active { background: #ca6f1e; }

    /* ── コピーライト ── */
    #app-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(var(--footer-h) + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: #bbb; background: #f0f2f5; z-index: 44;
    }

    /* ── 履歴タブ ── */
    .sessions-title { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
    .sessions-desc { font-size: 13px; color: #888; margin-bottom: 16px; line-height: 1.6; }
    .sessions-empty { text-align: center; padding: 40px 16px; font-size: 14px; color: #bbb; }

    .session-card {
      background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 10px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.09);
      user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
    }
    .session-card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .session-dot { width: 10px; height: 10px; border-radius: 50%; background: #35B79D; margin-top: 4px; flex-shrink: 0; }
    .session-dot.interrupted { background: #aaa; }
    .session-name { font-size: 15px; font-weight: 700; color: #222; flex: 1; line-height: 1.35; }
    .session-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .badge {
      display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600;
      padding: 3px 8px; border-radius: 16px; background: #f0f2f5; color: #555;
    }
    .badge.done { background: #e0f5f2; color: #1a7a6a; }
    .badge.partial { background: #fff3e0; color: #e65100; }
    .session-btns { display: flex; gap: 8px; }
    .btn-outline-danger {
      flex: 1; padding: 10px 0; font-size: 14px; font-weight: 700;
      background: transparent; color: #e53935; border: 1.5px solid #e53935; border-radius: 6px;
    }
    .btn-outline-danger:active { background: #ffebee; }
    .btn-outline-primary {
      flex: 1; padding: 10px 0; font-size: 14px; font-weight: 700;
      background: transparent; color: #35B79D; border: 1.5px solid #35B79D; border-radius: 6px;
    }
    .btn-outline-primary:active { background: #e0f5f2; }
    .btn-solid-primary {
      flex: 1; padding: 10px 0; font-size: 14px; font-weight: 700;
      background: #35B79D; color: #fff; border: none; border-radius: 6px;
    }
    .btn-solid-primary:active { background: #2a9a84; }

    /* ── コンテキストメニュー ── */
    .ctx-overlay { display: none; position: fixed; inset: 0; z-index: 100; }
    .ctx-menu {
      display: none; position: fixed; z-index: 101; background: #fff;
      border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.20);
      overflow: hidden; min-width: 160px;
    }
    .ctx-item {
      display: block; width: 100%; padding: 15px 20px; font-size: 15px; font-weight: 600;
      text-align: left; border: none; background: transparent; cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
    }
    .ctx-item:last-child { border-bottom: none; }
    .ctx-item:active { background: #f5f5f5; }
    .ctx-item.danger { color: #c62828; }

    /* ── ライトボックス ── */
    .lb-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      z-index: 300; flex-direction: column; align-items: center; justify-content: center;
    }
    .lb-overlay.open { display: flex; }

    .lb-close {
      position: absolute; top: 16px; right: 16px;
      width: 40px; height: 40px; font-size: 20px; color: #fff;
      background: rgba(255,255,255,0.18); border: none; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1;
    }
    .lb-close:active { background: rgba(255,255,255,0.35); }

    .lb-inner { display: flex; align-items: center; width: 100%; padding: 0; }

    .lb-img-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center; height: 76vh;
    }
    .lb-img-wrap img { max-width: 100%; max-height: 76vh; object-fit: contain; display: block; }
    .lb-noimage { display: none; color: #888; font-size: 14px; }

    .lb-loading {
      display: none; width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff; border-radius: 50%;
      animation: lb-spin 0.7s linear infinite;
    }
    @keyframes lb-spin { to { transform: rotate(360deg); } }

    .lb-prev, .lb-next {
      font-size: 44px; color: rgba(255,255,255,0.55); background: transparent;
      border: none; padding: 12px 10px; cursor: pointer; flex-shrink: 0;
      line-height: 1; -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }
    .lb-prev:active, .lb-next:active { color: #fff; }
    .lb-prev:disabled, .lb-next:disabled { color: rgba(255,255,255,0.15); cursor: default; }

    .lb-filename {
      position: absolute; bottom: calc(44px + env(safe-area-inset-bottom));
      left: 0; right: 0; text-align: center; font-size: 12px; font-family: monospace;
      color: rgba(255,255,255,0.5); pointer-events: none; letter-spacing: 0.3px;
    }
    .lb-dots {
      position: absolute; bottom: calc(16px + env(safe-area-inset-bottom));
      left: 0; right: 0; display: flex; align-items: center; justify-content: center;
      flex-wrap: wrap; gap: 6px; padding: 0 24px; pointer-events: none;
    }
    .lb-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.3); flex-shrink: 0;
      transition: background 0.2s, transform 0.2s;
    }
    .lb-dot.active { background: #fff; transform: scale(1.4); }
  </style>
</head>
<body>

<!-- パスワード画面 -->
<div class="auth-overlay" id="auth-overlay">
  <div class="auth-box">
    <div class="auth-logo">🔍</div>
    <div class="auth-title">WS画像チェックツール</div>
    <div class="auth-sub">宝美堂 社内専用</div>
    <input class="auth-input" type="password" id="auth-input" placeholder="パスワード" maxlength="20">
    <button class="btn-login" onclick="checkPassword()">ログイン</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- アプリヘッダー（ロゴ+タイトル） -->
<header class="app-header">
  <h1 class="app-title">
    <img src="icon_ws-image-checker.png" alt="" class="app-logo">
    WS画像検索ツール_v1.26
  </h1>
</header>

<!-- タブバー（上部固定） -->
<div class="tabbar">
  <button class="tab active" id="tab-search" onclick="switchTab('search')">
    <span class="tab-icon">🔍</span>画像検索
  </button>
  <button class="tab" id="tab-sessions" onclick="switchTab('sessions')">
    <span class="tab-icon">📁</span>履歴（セッション）
  </button>
</div>

<!-- ══ 検索タブ ══ -->
<div class="tabpane active" id="pane-search">

  <div class="panel" id="input-panel">
    <div class="panel-header" onclick="togglePanel()">
      <div class="panel-title-row">
        <span class="panel-icon">📋</span>
        <span class="panel-title">管理番号入力</span>
        <span class="panel-status" id="panel-status"></span>
      </div>
      <span class="toggle-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="18 15 12 9 6 15"/>
        </svg>
      </span>
    </div>
    <div class="panel-body">
      <p class="panel-hint">※改行・カンマ・スペース区切り対応<br>※画像はWSから取得しています</p>
      <textarea id="codes-input" placeholder="ここに12桁の管理番号を入力"></textarea>
      <div class="btn-row">
        <button class="btn-clear" onclick="clearInput()">クリア</button>
        <button class="btn-show" onclick="showItems()">🔍 表示</button>
      </div>
    </div>
  </div>

  <div class="results-header" id="results-header">
    <div class="results-count" id="results-count"></div>
    <button class="btn-select-all" id="btn-select-all" onclick="toggleSelectAll()">すべて選択</button>
  </div>

  <div class="grid" id="grid"></div>

</div>

<!-- ══ 履歴タブ ══ -->
<div class="tabpane" id="pane-sessions">
  <div class="sessions-title">セッション履歴</div>
  <div class="sessions-desc">過去の検証セッションを確認し、必要に応じて状態を復元できます。</div>
  <div id="sessions-empty" class="sessions-empty">保存済みの履歴はありません</div>
  <div id="sessions-list"></div>
</div>

<!-- 保存バー（コピーライトの上に追従） -->
<div class="save-bar" id="save-bar">
  <button class="btn-save-fixed" onclick="saveSession()">💾 このセッションを保存</button>
</div>

<!-- コピーライト（最下部固定） -->
<footer id="app-footer">© 2026 houbidou_kuwahara</footer>

<!-- ライトボックス -->
<div class="lb-overlay" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div class="lb-inner">
    <button class="lb-prev" id="lb-prev" onclick="lbPrev()">‹</button>
    <div class="lb-img-wrap">
      <img id="lb-img" src="" alt="">
      <div class="lb-loading" id="lb-loading"></div>
      <div class="lb-noimage" id="lb-noimage">No Image</div>
    </div>
    <button class="lb-next" id="lb-next" onclick="lbNext()">›</button>
  </div>
  <div class="lb-filename" id="lb-filename"></div>
  <div class="lb-dots" id="lb-dots"></div>
</div>

<!-- コンテキストメニュー -->
<div class="ctx-overlay" id="ctx-overlay" onclick="closeCtx()"></div>
<div class="ctx-menu" id="ctx-menu">
  <button class="ctx-item" onclick="ctxRestore()">↩ セッション復元</button>
  <button class="ctx-item danger" onclick="ctxDelete()">🗑 削除</button>
</div>

<script>
  // ── パスワード認証 ──────────────────────────────
  const PASSWORD   = 'houbidou01';
  const AUTH_KEY   = 'ws_auth_v1';
  const AUTH_TOKEN = btoa(PASSWORD);

  function checkAuth() {
    if (localStorage.getItem(AUTH_KEY) === AUTH_TOKEN)
      document.getElementById('auth-overlay').style.display = 'none';
  }
  function checkPassword() {
    const input = document.getElementById('auth-input').value;
    if (input === PASSWORD) {
      localStorage.setItem(AUTH_KEY, AUTH_TOKEN);
      document.getElementById('auth-overlay').style.display = 'none';
    } else {
      document.getElementById('auth-error').textContent = 'パスワードが違います';
      document.getElementById('auth-input').value = '';
      document.getElementById('auth-input').focus();
    }
  }

  // ── 定数 ──────────────────────────────────────
  const BASE_URL    = 'https://s3-ap-northeast-1.amazonaws.com/worldswitch-html-upload.world-switch.com/houbidou/save_image/240/';
  const LS_CHECKS   = 'houbidou_chk_v1';
  const LS_SESSIONS = 'houbidou_sessions_v1';

  function getChecks()    { try { return JSON.parse(localStorage.getItem(LS_CHECKS)   || '{}'); } catch { return {}; } }
  function setChecks(o)   { localStorage.setItem(LS_CHECKS,   JSON.stringify(o)); }
  function getSessions()  { try { return JSON.parse(localStorage.getItem(LS_SESSIONS) || '[]'); } catch { return []; } }
  function setSessions(a) { localStorage.setItem(LS_SESSIONS, JSON.stringify(a)); }

  let currentCodes = [];

  // ── 初期化 ────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    checkAuth();
    document.getElementById('auth-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    // ライトボックス：背景タップ・キーボード（スワイプなし＝ピンチズーム優先）
    const lb = document.getElementById('lightbox');
    lb.addEventListener('click', e => {
      if (e.target === lb) closeLightbox();
    });
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'ArrowLeft')  lbPrev();
      if (e.key === 'ArrowRight') lbNext();
      if (e.key === 'Escape')     closeLightbox();
    });
  });

  // ── タブ切り替え ──────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tabpane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('pane-' + name).classList.add('active');
    document.getElementById('tab-'  + name).classList.add('active');
    if (name === 'sessions') renderSessions();
  }

  // ── 入力パネル ────────────────────────────────
  function togglePanel() {
    document.getElementById('input-panel').classList.toggle('collapsed');
  }
  function clearInput() {
    document.getElementById('codes-input').value = '';
    document.getElementById('codes-input').focus();
  }
  function parseCodes(raw) {
    return [...new Set(
      raw.split(/[\r\n,、\s]+/).map(s => s.trim()).filter(s => /^\d{12}$/.test(s))
    )];
  }

  // ── 商品カード表示 ────────────────────────────
  function showItems() {
    const raw = document.getElementById('codes-input').value;
    const codes = parseCodes(raw);
    if (!codes.length) return;

    currentCodes = codes;
    const checks = getChecks();
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    codes.forEach((code, idx) => {
      const checked = !!checks[code];
      const imgUrl  = `${BASE_URL}${encodeURIComponent(code)}/${encodeURIComponent(code)}-1.jpg`;

      const card = document.createElement('div');
      card.className = 'card' + (checked ? ' checked' : '');
      card.id = 'c_' + code;
      card.innerHTML = `
        <div class="card-img-wrap">
          <img src="${imgUrl}" alt="${escHtml(code)}" loading="lazy">
          <div class="check-overlay">
            <div class="check-overlay-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </div>
          </div>
          <div class="noimage-wrap">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <polyline points="3,17 8,12 11,15 14,11 21,17"/>
              <line x1="2" y1="2" x2="22" y2="22"/>
            </svg>
            <span>No Image</span>
          </div>
          <div class="card-num">${idx + 1}</div>
        </div>
        <div class="card-footer">
          <span class="card-code">${escHtml(code)}</span>
          <span class="card-status">${checked ? '確認済み' : '未確認'}</span>
          <input type="checkbox" class="card-checkbox" ${checked ? 'checked' : ''}>
        </div>
      `;

      card.querySelector('img').addEventListener('error', function() {
        this.style.display = 'none';
        card.querySelector('.noimage-wrap').style.display = 'flex';
      });
      card.querySelector('.card-checkbox').addEventListener('change', function() {
        toggleCheck(code, this.checked);
      });
      /* 画像エリアタップ → ライトボックス */
      card.querySelector('.card-img-wrap').addEventListener('click', () => {
        openLightbox(code);
      });

      grid.appendChild(card);
    });

    updateStats();
    document.getElementById('save-bar').style.display = 'block';
    document.getElementById('results-header').style.display = 'flex';
    document.getElementById('panel-status').textContent = `${codes.length}件`;
    document.getElementById('input-panel').classList.add('collapsed');
  }

  // ── チェック操作 ──────────────────────────────
  function toggleCheck(code, checked) {
    const checks = getChecks();
    if (checked) checks[code] = true; else delete checks[code];
    setChecks(checks);
    const card = document.getElementById('c_' + code);
    if (card) {
      card.classList.toggle('checked', checked);
      card.querySelector('.card-status').textContent = checked ? '確認済み' : '未確認';
    }
    updateStats();
  }

  function updateStats() {
    const total = currentCodes.length;
    const done  = document.querySelectorAll('.card.checked').length;
    document.getElementById('results-count').textContent = `検索結果（${total}件）`;
    const btn = document.getElementById('btn-select-all');
    btn.textContent = (done === total && total > 0) ? 'すべて解除' : 'すべて選択';
  }

  function toggleSelectAll() {
    const total   = currentCodes.length;
    const done    = document.querySelectorAll('.card.checked').length;
    const toCheck = !(done === total && total > 0);
    const checks  = getChecks();
    currentCodes.forEach(code => {
      if (toCheck) checks[code] = true; else delete checks[code];
      const card = document.getElementById('c_' + code);
      if (card) {
        card.classList.toggle('checked', toCheck);
        card.querySelector('.card-status').textContent = toCheck ? '確認済み' : '未確認';
        card.querySelector('.card-checkbox').checked = toCheck;
      }
    });
    setChecks(checks);
    updateStats();
  }

  // ── セッション保存 ────────────────────────────
  function saveSession() {
    if (!currentCodes.length) return;
    const now = new Date();
    const dateStr = now.toLocaleDateString('ja-JP', {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\//g,'-');
    const name = prompt('セッション名を入力してください', `${dateStr} 棚卸`);
    if (name === null) return;
    if (!name.trim()) { alert('セッション名を入力してください'); return; }

    const checks = getChecks();
    const sessionChecks = {};
    currentCodes.forEach(code => { if (checks[code]) sessionChecks[code] = true; });

    const sessions = getSessions();
    sessions.unshift({
      id: Date.now(), name: name.trim(), date: dateStr,
      count: currentCodes.length, verified: Object.keys(sessionChecks).length,
      codes: [...currentCodes], checks: sessionChecks
    });
    if (sessions.length > 50) sessions.splice(50);
    setSessions(sessions);
    alert(`「${name.trim()}」を保存しました`);
  }

  // ── 履歴レンダリング ──────────────────────────
  function renderSessions() {
    const sessions = getSessions();
    const list  = document.getElementById('sessions-list');
    const empty = document.getElementById('sessions-empty');
    list.innerHTML = '';
    empty.style.display = sessions.length ? 'none' : 'block';

    sessions.forEach(s => {
      const total    = s.count || 0;
      const verified = s.verified !== undefined ? s.verified : Object.keys(s.checks || {}).length;
      const isDone   = verified >= total && total > 0;

      const card = document.createElement('div');
      card.className = 'session-card';
      const badgeCls = isDone ? 'done' : 'partial';
      card.innerHTML = `
        <div class="session-card-top">
          <div class="session-dot ${isDone ? '' : 'interrupted'}"></div>
          <div class="session-name">${escHtml(s.name)}</div>
        </div>
        <div class="session-badges">
          <span class="badge">🖼 ${total}件の画像</span>
          <span class="badge ${badgeCls}">検証済: ${verified}/${total}</span>
        </div>
        <div class="session-btns">
          <button class="btn-outline-danger">🗑 削除</button>
          ${isDone
            ? `<button class="btn-outline-primary">↩ 復元</button>`
            : `<button class="btn-solid-primary">▶ 再開</button>`}
        </div>
      `;
      card.querySelector('.btn-outline-danger').addEventListener('click', () => deleteSessionById(s.id));
      card.querySelector(isDone ? '.btn-outline-primary' : '.btn-solid-primary')
          .addEventListener('click', () => restoreSessionById(s.id));

      let pressTimer = null;
      card.addEventListener('touchstart', e => {
        if (e.target.closest('.session-btns')) return;
        pressTimer = setTimeout(() => showCtxMenu(e.touches[0].clientX, e.touches[0].clientY, s.id), 500);
      }, { passive: true });
      card.addEventListener('touchend',  () => clearTimeout(pressTimer));
      card.addEventListener('touchmove', () => clearTimeout(pressTimer));
      card.addEventListener('contextmenu', e => { e.preventDefault(); showCtxMenu(e.clientX, e.clientY, s.id); });
      list.appendChild(card);
    });
  }

  function restoreSessionById(id) {
    const session = getSessions().find(s => s.id === id);
    if (!session) return;
    switchTab('search');
    document.getElementById('codes-input').value = session.codes.join('\n');
    const checks = getChecks();
    Object.assign(checks, session.checks);
    setChecks(checks);
    document.getElementById('input-panel').classList.remove('collapsed');
    showItems();
  }

  function deleteSessionById(id) {
    const session = getSessions().find(s => s.id === id);
    if (!session) return;
    if (!confirm(`「${session.name}」を削除しますか？`)) return;
    setSessions(getSessions().filter(s => s.id !== id));
    renderSessions();
  }

  // ── コンテキストメニュー ──────────────────────
  let ctxTargetId = null;
  function showCtxMenu(x, y, sessionId) {
    ctxTargetId = sessionId;
    const menu = document.getElementById('ctx-menu');
    document.getElementById('ctx-overlay').style.display = 'block';
    menu.style.display = 'block';
    menu.style.left = `${Math.min(x, window.innerWidth  - menu.offsetWidth  - 12)}px`;
    menu.style.top  = `${Math.min(y, window.innerHeight - menu.offsetHeight - 12)}px`;
  }
  function closeCtx() {
    document.getElementById('ctx-overlay').style.display = 'none';
    document.getElementById('ctx-menu').style.display = 'none';
    ctxTargetId = null;
  }
  function ctxRestore() { const id = ctxTargetId; closeCtx(); restoreSessionById(id); }
  function ctxDelete()  { const id = ctxTargetId; closeCtx(); deleteSessionById(id); }

  // ── ライトボックス ────────────────────────────
  let lbCode   = null;
  let lbImages = [];
  let lbIdx    = 0;

  function openLightbox(code) {
    lbCode   = code;
    lbImages = [];
    lbIdx    = 0;

    const lb = document.getElementById('lightbox');
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
    // ピンチズームを有効化
    document.getElementById('viewport-meta').content = 'width=device-width, initial-scale=1.0';

    // ローディング表示
    document.getElementById('lb-img').style.display = 'none';
    document.getElementById('lb-noimage').style.display = 'none';
    document.getElementById('lb-loading').style.display = 'block';
    document.getElementById('lb-dots').innerHTML = '';
    document.getElementById('lb-prev').style.visibility = 'hidden';
    document.getElementById('lb-next').style.visibility = 'hidden';

    // 1枚目を読み込み
    const url1 = imgUrl(code, 1);
    const img1 = new Image();
    img1.onload = () => {
      if (lbCode !== code) return;
      lbImages = [url1];
      document.getElementById('lb-loading').style.display = 'none';
      showLbImage(0);
      probeLb(code, 2); // バックグラウンドで残りを確認
    };
    img1.onerror = () => {
      if (lbCode !== code) return;
      lbImages = [null]; // NO IMAGE
      document.getElementById('lb-loading').style.display = 'none';
      showLbImage(0);
    };
    img1.src = url1;
  }

  function imgUrl(code, n) {
    return `${BASE_URL}${encodeURIComponent(code)}/${encodeURIComponent(code)}-${n}.jpg`;
  }

  function probeLb(code, n) {
    if (n > 20 || lbCode !== code) return;
    const url = imgUrl(code, n);
    const img = new Image();
    img.onload = () => {
      if (lbCode !== code) return;
      lbImages.push(url);
      updateLbUI();
      probeLb(code, n + 1);
    };
    img.onerror = () => {}; // 途切れたら終了
    img.src = url;
  }

  function showLbImage(idx) {
    lbIdx = idx;
    const url = lbImages[idx];
    const img   = document.getElementById('lb-img');
    const noimg = document.getElementById('lb-noimage');
    if (url) {
      img.src = url;
      img.style.display = 'block';
      noimg.style.display = 'none';
    } else {
      img.src = '';
      img.style.display = 'none';
      noimg.style.display = 'block';
    }
    updateLbUI();
  }

  function updateLbUI() {
    // ファイル名表示
    document.getElementById('lb-filename').textContent =
      lbImages.length && lbImages[lbIdx] ? `${lbCode}-${lbIdx + 1}.jpg` : '';
    // ドットインジケーター生成
    const dotsEl = document.getElementById('lb-dots');
    dotsEl.innerHTML = '';
    if (lbImages.length > 1) {
      lbImages.forEach((_, i) => {
        const dot = document.createElement('span');
        dot.className = 'lb-dot' + (i === lbIdx ? ' active' : '');
        dotsEl.appendChild(dot);
      });
    }
    // 1枚のみの場合は矢印を非表示
    const single = lbImages.length <= 1;
    document.getElementById('lb-prev').style.visibility = single ? 'hidden' : 'visible';
    document.getElementById('lb-next').style.visibility = single ? 'hidden' : 'visible';
  }

  // ループあり
  function lbPrev() {
    if (lbImages.length <= 1) return;
    showLbImage((lbIdx - 1 + lbImages.length) % lbImages.length);
  }
  function lbNext() {
    if (lbImages.length <= 1) return;
    showLbImage((lbIdx + 1) % lbImages.length);
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
    // ピンチズームを再度無効化
    document.getElementById('viewport-meta').content = 'width=device-width, initial-scale=1.0, user-scalable=no';
    lbCode = null;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
